<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Set Admin Password</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header>
    <h1>Set Admin Password</h1>
    <p>Create your organization admin password from the setup link.</p>
  </header>

  <main>
    <section class="panel">
      <h2>Admin setup</h2>
      <form id="resetForm">
        <label for="password">New password</label>
        <input id="password" type="password" placeholder="At least 8 characters" required>

        <label for="confirmPassword">Confirm password</label>
        <input id="confirmPassword" type="password" placeholder="Re-enter password" required>

        <div class="actions">
          <button type="submit">Set password</button>
        </div>
        <p id="status" class="status"></p>
      </form>
    </section>
  </main>

  <script>
    const statusEl = document.getElementById('status');
    const token = new URLSearchParams(window.location.search).get('token');

    if (!token) {
      statusEl.textContent = 'Missing setup token. Open the link from your email or server terminal.';
      document.getElementById('resetForm').querySelector('button').disabled = true;
    }

    document.getElementById('resetForm').addEventListener('submit', async (event) => {
      event.preventDefault();

      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (password !== confirmPassword) {
        statusEl.textContent = 'Passwords do not match.';
        return;
      }

      statusEl.textContent = 'Setting password...';

      try {
        const response = await fetch('/api/auth/admin-password/reset', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password })
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.message || 'Password setup failed');

        statusEl.innerHTML = `${data.message} <a href="/Org-Admin.html">Go to admin login</a>`;
        event.target.reset();
      } catch (err) {
        statusEl.textContent = err.message;
      }
    });
  </script>
</body>
</html>
